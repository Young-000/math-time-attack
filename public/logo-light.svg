<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="brainGradientL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3182F6"/>
      <stop offset="100%" style="stop-color:#1864D0"/>
    </linearGradient>
    <linearGradient id="boltGradientL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF922B"/>
      <stop offset="100%" style="stop-color:#F76707"/>
    </linearGradient>
    <filter id="glowL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="#FFFFFF"/>

  <!-- 두뇌 (중앙) -->
  <g transform="translate(300, 300)" filter="url(#glowL)">
    <ellipse cx="-55" cy="0" rx="95" ry="115" fill="url(#brainGradientL)" opacity="0.95"/>
    <ellipse cx="-80" cy="-55" rx="42" ry="34" fill="url(#brainGradientL)"/>
    <ellipse cx="-98" cy="15" rx="34" ry="42" fill="url(#brainGradientL)"/>
    <ellipse cx="-78" cy="75" rx="48" ry="34" fill="url(#brainGradientL)"/>

    <ellipse cx="55" cy="0" rx="95" ry="115" fill="url(#brainGradientL)" opacity="0.95"/>
    <ellipse cx="80" cy="-55" rx="42" ry="34" fill="url(#brainGradientL)"/>
    <ellipse cx="98" cy="15" rx="34" ry="42" fill="url(#brainGradientL)"/>
    <ellipse cx="78" cy="75" rx="48" ry="34" fill="url(#brainGradientL)"/>

    <ellipse cx="0" cy="25" rx="22" ry="65" fill="url(#brainGradientL)" opacity="0.85"/>
  </g>

  <!-- 번개 왼쪽 -->
  <g transform="translate(55, 115) scale(1.5)" filter="url(#glowL)">
    <polygon points="50,0 18,60 36,60 0,110 62,48 40,48 68,0" fill="url(#boltGradientL)"/>
  </g>

  <!-- 번개 오른쪽 -->
  <g transform="translate(443, 115) scale(1.5)" filter="url(#glowL)">
    <polygon points="18,0 50,60 32,60 68,110 6,48 28,48 0,0" fill="url(#boltGradientL)"/>
  </g>
</svg>
