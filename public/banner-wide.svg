<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1932 828">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#191F28"/>
      <stop offset="100%" style="stop-color:#1B2636"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C9FFF"/>
      <stop offset="100%" style="stop-color:#3182F6"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#FFD43B"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1932" height="828" fill="url(#bgGrad)"/>

  <!-- Brain icon (left side) -->
  <g transform="translate(500, 414) scale(0.6)" filter="url(#glow)">
    <ellipse cx="-55" cy="0" rx="95" ry="115" fill="url(#brainGrad)" opacity="0.95"/>
    <ellipse cx="-80" cy="-55" rx="42" ry="34" fill="url(#brainGrad)"/>
    <ellipse cx="-98" cy="15" rx="34" ry="42" fill="url(#brainGrad)"/>
    <ellipse cx="-78" cy="75" rx="48" ry="34" fill="url(#brainGrad)"/>
    <ellipse cx="55" cy="0" rx="95" ry="115" fill="url(#brainGrad)" opacity="0.95"/>
    <ellipse cx="80" cy="-55" rx="42" ry="34" fill="url(#brainGrad)"/>
    <ellipse cx="98" cy="15" rx="34" ry="42" fill="url(#brainGrad)"/>
    <ellipse cx="78" cy="75" rx="48" ry="34" fill="url(#brainGrad)"/>
    <ellipse cx="0" cy="25" rx="22" ry="65" fill="url(#brainGrad)" opacity="0.85"/>
  </g>

  <!-- Lightning left -->
  <g transform="translate(365, 320) scale(0.9)" filter="url(#glow)">
    <polygon points="50,0 18,60 36,60 0,110 62,48 40,48 68,0" fill="url(#boltGrad)"/>
  </g>

  <!-- Lightning right -->
  <g transform="translate(598, 320) scale(0.9)" filter="url(#glow)">
    <polygon points="18,0 50,60 32,60 68,110 6,48 28,48 0,0" fill="url(#boltGrad)"/>
  </g>

  <!-- App name -->
  <text x="966" y="380" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="120" font-weight="800" fill="#FFFFFF" letter-spacing="-2">
    구구단 챌린지
  </text>

  <!-- Subtitle -->
  <text x="966" y="470" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="48" font-weight="400" fill="#8B95A1">
    두뇌를 깨우는 연산 게임
  </text>
</svg>
